name: 'POA&M Security Gate'
description: >
  Converts Trivy scan results into a POA&M (Plan of Action & Milestones).
  First run creates the POA&M with tracking IDs per CVE; subsequent runs diff
  against the previous state (close fixed CVEs, keep open ones, add new ones,
  reopen recurrences) and fail the build when new/reopened findings meet the
  fail-on severity threshold. Produces poam.json (machine state) and poam.xlsx
  (Summary / Open / Closed sheets).
branding:
  icon: shield
  color: blue

inputs:
  trivy-results:
    description: 'Path (or comma-separated paths) to Trivy JSON result files'
    required: true
  poam-file:
    description: >
      Path to the POA&M JSON produced by the previous run. If empty or the
      file does not exist, the action runs in "initial" mode and creates a
      brand-new POA&M.
    required: false
    default: ''
  system-name:
    description: 'Name of the system/image family being tracked (e.g. github-runner-image)'
    required: true
  image-ref:
    description: 'Fully qualified image reference that was scanned'
    required: false
    default: ''
  output-dir:
    description: 'Directory where poam.json and poam.xlsx are written'
    required: false
    default: 'poam-out'
  fail-on:
    description: >
      Minimum severity of NEW or REOPENED findings that fails the gate.
      One of CRITICAL, HIGH, MEDIUM, LOW, or NONE to never fail.
    required: false
    default: 'CRITICAL'
  sla:
    description: 'Remediation SLAs in days per severity'
    required: false
    default: 'CRITICAL=15,HIGH=30,MEDIUM=90,LOW=180'
  waivers-file:
    description: >
      Optional JSON file of risk-accepted findings:
      [{"cve_id": "CVE-2024-1234", "package": "openssl", "reason": "...",
        "expires": "2026-09-30", "approved_by": "secops"}]
      Waived findings stay on the POA&M but do not fail the gate until the
      waiver expires.
    required: false
    default: ''

outputs:
  gate-result:
    description: 'pass or fail'
    value: ${{ steps.poam.outputs.gate-result }}
  mode:
    description: 'initial or validate'
    value: ${{ steps.poam.outputs.mode }}
  open-count:
    description: 'Total open POA&M items after this run'
    value: ${{ steps.poam.outputs.open-count }}
  closed-count:
    description: 'Total closed POA&M items after this run'
    value: ${{ steps.poam.outputs.closed-count }}
  new-count:
    description: 'Findings first seen this run'
    value: ${{ steps.poam.outputs.new-count }}
  reopened-count:
    description: 'Previously closed findings that reappeared this run'
    value: ${{ steps.poam.outputs.reopened-count }}
  closed-this-run:
    description: 'Findings moved to Closed this run'
    value: ${{ steps.poam.outputs.closed-this-run }}
  failing-count:
    description: 'New/reopened findings at or above the fail-on threshold'
    value: ${{ steps.poam.outputs.failing-count }}
  poam-json:
    description: 'Path to the generated poam.json'
    value: ${{ steps.poam.outputs.poam-json }}
  poam-xlsx:
    description: 'Path to the generated poam.xlsx'
    value: ${{ steps.poam.outputs.poam-xlsx }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: python -m pip install --quiet 'openpyxl>=3.1,<4'

    - name: Generate / validate POA&M
      id: poam
      shell: bash
      run: |
        python "${{ github.action_path }}/poam.py" \
          --trivy-results "${{ inputs.trivy-results }}" \
          --poam-file     "${{ inputs.poam-file }}" \
          --output-dir    "${{ inputs.output-dir }}" \
          --system-name   "${{ inputs.system-name }}" \
          --image-ref     "${{ inputs.image-ref }}" \
          --fail-on       "${{ inputs.fail-on }}" \
          --sla           "${{ inputs.sla }}" \
          --waivers-file  "${{ inputs.waivers-file }}"
